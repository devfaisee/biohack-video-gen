[providers]
node = true

[phases.setup]
nixPkgs = ["ffmpeg"]
aptPkgs = ["fontconfig", "fonts-liberation", "fonts-dejavu", "fonts-noto"]

[phases.install]
cmds = [
  "cd server && npm install",
  "mkdir -p ~/.local/share/fonts",
  "cp server/assets/fonts/*.ttf ~/.local/share/fonts/ || true",
  "fc-cache -fv"
]

[start]
cmd = "cd server && node server.js"
